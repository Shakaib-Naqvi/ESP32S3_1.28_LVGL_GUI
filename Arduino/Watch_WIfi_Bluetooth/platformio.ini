[platformio]
src_dir = .
include_dir = .
build_dir = .b
libdeps_dir = .ld

[env:waveshare_esp32s3_touch_lcd_128]
platform = espressif32
board = waveshare_esp32s3_touch_lcd_128
framework = arduino
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 16MB
board_build.partitions = app3M_fat9M_16MB.csv
src_filter =
    +<*.ino>
    +<*.c>
    +<*.cpp>
    -<components/>
    -<out/>
    -<backup/>
    -<autosave/>
    -<assets/>
    -<cache/>
    -<bin/>
    -<__vm/>
build_flags =
    -I.
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DUSER_SETUP_LOADED
    -DUSE_FSPI_PORT
    -DGC9A01_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=12
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=14
    -DTFT_BL=2
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=20000000
lib_deps =
    lvgl/lvgl@8.3.11
    bodmer/TFT_eSPI@2.5.43
lib_archive = false
